<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ynov Forum - Discussions</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo" onclick="showView('view-home')">Ynov Forum</div>
        
        <div class="search-area">
            <input type="text" id="search-input" placeholder="Rechercher par titre ou tag...">
        </div>

        <nav class="header-right">
            <span id="user-welcome"></span>
            <button id="theme-toggle">🌓</button>
            <button id="btn-create-topic-nav" class="btn-accent">+ Nouveau Topic</button>
            <button id="btn-admin-dashboard" class="hidden">Admin</button>
            <button id="btn-logout">Déconnexion</button>
        </nav>
    </header>

    <main id="app-container">
        <section id="view-home">
            <div class="filters">
                <select id="filter-tag">
                    <option value="">Toutes les catégories</option>
                    <option value="tech">Tech</option>
                    <option value="aide">Aide</option>
                    <option value="loisirs">Loisirs</option>
                </select>
                <select id="sort-order">
                    <option value="newest">Plus récent</option>
                    <option value="popular">Plus populaire</option>
                </select>
            </div>

            <div id="topics-list">
            </div>

            <div class="pagination">
                <span>Afficher :</span>
                <select id="page-size">
                    <option value="10">10</option>
                    <option value="20">20</option>
                    <option value="30">30</option>
                    <option value="all">Totalité</option>
                </select>
            </div>
        </section>

        <section id="view-create-topic" class="hidden">
            <h2>Créer un nouveau sujet</h2>
            <form id="create-topic-form">
                <input type="text" id="topic-title" placeholder="Titre du sujet" required>
                <textarea id="topic-body" placeholder="Description détaillée..." required></textarea>
                <input type="text" id="topic-tags" placeholder="Tags (séparés par des virgules)">
                <div class="form-buttons">
                    <button type="submit" class="btn-accent">Publier</button>
                    <button type="button" class="btn-cancel">Annuler</button>
                </div>
            </form>
        </section>

        <section id="view-topic-detail" class="hidden">
            <button class="btn-cancel" href="forum.html">← Retour</button>
            <div id="topic-detail-content"></div>
            <hr>
            <h3>Réponses</h3>
            <div id="messages-list"></div>
            <form id="add-message-form">
                <textarea id="msg-body" placeholder="Votre réponse..." required></textarea>
                <button type="submit" class="btn-accent">Envoyer le message</button>
            </form>
        </section>

        <section id="view-admin" class="hidden">
            <h2>Console d'Administration</h2>
            <div class="admin-grid">
                <div class="admin-card">
                    <h3>Modération Topics</h3>
                    <div id="admin-topics-list"></div>
                </div>
                <div class="admin-card">
                    <h3>Utilisateurs</h3>
                    <div id="admin-users-list"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast-container"></div>

    <script src="js/forum.js"></script>
</body>
</html>
